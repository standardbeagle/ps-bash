name: Publish Release

# Trait policy (Directive 5):
# Every [Fact] that is platform-locked MUST declare:
#   [Trait("Platform", "Windows")] (or "Linux" / "macOS")
#   [SkippableFact] with a reason on other platforms
# Tests that skip without a recognized reason fail the skip-report step.
# Recognized reasons: see scripts/skip-report.sh ALLOW_LIST.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: .exe
            archive: win-x64
          - os: ubuntu-latest
            rid: linux-x64
            ext: ""
            archive: linux-x64
          - os: macos-latest
            rid: osx-arm64
            ext: ""
            archive: osx-arm64
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish AOT binary
        run: dotnet publish src/PsBash.Shell -c Release -r ${{ matrix.rid }} --self-contained true /p:PublishAot=true /p:StripSymbols=true -o ./publish

      - name: Package binary
        shell: pwsh
        run: |
          $version = '${{ github.event_name }}' -eq 'release' ? '${{ github.event.release.tag_name }}' : 'v${{ github.event.inputs.version }}'
          $name = "ps-bash-${version}-${{ matrix.archive }}"
          $src = "./publish/ps-bash${{ matrix.ext }}"
          $dst = "./artifacts/${name}.zip"
          New-Item -ItemType Directory -Force -Path ./artifacts | Out-Null
          if ($IsWindows) {
            Compress-Archive -Path $src -DestinationPath $dst -Force
          } else {
            zip -j $dst $src
          }

      - name: Upload release asset
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $version = if ('${{ github.event_name }}' -eq 'release') {
              '${{ github.event.release.tag_name }}'
          } else {
              'v${{ github.event.inputs.version }}'
          }
          $archive = '${{ matrix.archive }}'
          $file = "./artifacts/ps-bash-${version}-${archive}.zip"
          gh release upload $version $file --clobber

      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ps-bash-${{ matrix.archive }}
          path: ./artifacts/*.zip

  test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
      fail-fast: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build ps-bash binary
        shell: bash
        run: dotnet build src/PsBash.Shell -c Release

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config

      # ── PsBash.Core.Tests (parser + emitter unit tests) ──────────────────────
      - name: Run PsBash.Core.Tests
        shell: bash
        run: |
          dotnet test src/PsBash.Core.Tests/PsBash.Core.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=core.trx" \
            --results-directory TestResults/core \
            --collect "XPlat Code Coverage"

      - name: Skip report — Core.Tests
        if: always()
        shell: bash
        run: bash scripts/skip-report.sh TestResults/core "Core.Tests (${{ matrix.os }})"

      # ── PsBash.Cmdlets.Tests ─────────────────────────────────────────────────
      - name: Run PsBash.Cmdlets.Tests
        shell: bash
        run: |
          dotnet test src/PsBash.Cmdlets.Tests/PsBash.Cmdlets.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=cmdlets.trx" \
            --results-directory TestResults/cmdlets \
            --collect "XPlat Code Coverage"

      - name: Skip report — Cmdlets.Tests
        if: always()
        shell: bash
        run: bash scripts/skip-report.sh TestResults/cmdlets "Cmdlets.Tests (${{ matrix.os }})"

      # ── PsBash.Shell.Tests (requires binary built above) ────────────────────
      - name: Run PsBash.Shell.Tests
        shell: bash
        run: |
          dotnet test src/PsBash.Shell.Tests/PsBash.Shell.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=shell.trx" \
            --results-directory TestResults/shell \
            --collect "XPlat Code Coverage"

      - name: Skip report — Shell.Tests
        if: always()
        shell: bash
        run: bash scripts/skip-report.sh TestResults/shell "Shell.Tests (${{ matrix.os }})"

      # ── PsBash.Differential.Tests ────────────────────────────────────────────
      # Linux: differential mode (bash oracle available).
      # macOS: golden mode if bash < 4 (macOS ships bash 3.x due to GPLv3).
      # Windows: golden mode (no native bash; WSL checked at runtime by BashLocator).
      - name: Run PsBash.Differential.Tests
        shell: bash
        run: |
          # Determine mode: Linux always runs differential; other platforms use
          # golden mode unless bash 4+ is natively available.
          UPDATE_GOLDENS=0
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            echo "Platform: Linux — running in differential mode (bash oracle)"
          else
            bash_ver=$(bash --version 2>/dev/null | head -1 || true)
            major=$(echo "$bash_ver" | grep -oP 'version \K[0-9]+' || echo "0")
            if [[ "$major" -ge 4 ]]; then
              echo "Platform: $RUNNER_OS — bash $major found, running differential mode"
            else
              echo "Platform: $RUNNER_OS — bash < 4 or unavailable, running golden mode (UPDATE_GOLDENS=0)"
              UPDATE_GOLDENS=0
            fi
          fi
          export UPDATE_GOLDENS
          dotnet test src/PsBash.Differential.Tests/PsBash.Differential.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=differential.trx" \
            --results-directory TestResults/differential \
            --collect "XPlat Code Coverage"

      - name: Skip report — Differential.Tests
        if: always()
        shell: bash
        run: bash scripts/skip-report.sh TestResults/differential "Differential.Tests (${{ matrix.os }})"

      # ── Quarantine report ────────────────────────────────────────────────────
      - name: Quarantine report
        if: always()
        shell: bash
        run: |
          echo "=== Quarantined tests ===" >&2
          count=$(dotnet test \
            --filter "Quarantined=notEmpty" \
            --configuration Release \
            --no-build \
            --list-tests 2>/dev/null \
            | grep -c "^\s*" || echo "0")
          echo "Quarantined test count: ${count}" >&2

      # ── Diff-coverage gate (PRs touching PsBash.Core or PsBash.Module) ──────
      - name: Diff-coverage gate
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          # Collect one representative coverage XML for the gate check.
          # Coverlet places coverage.cobertura.xml under TestResults/<guid>/
          xml=$(find TestResults -name "coverage.cobertura.xml" 2>/dev/null | head -1 || true)
          if [[ -n "$xml" ]]; then
            bash scripts/diff-coverage.sh "$xml" "origin/${{ github.base_ref }}" || {
              echo "::warning::Diff-coverage gate failed — see diff-coverage.sh output above"
            }
          else
            echo "::warning::No coverage XML found; skipping diff-coverage gate"
          fi

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            TestResults/**/*.trx
            src/PsBash.Differential.Tests/Goldens/*.received.txt
          if-no-files-found: ignore

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from release tag
        shell: pwsh
        run: |
          $version = if ('${{ github.event_name }}' -eq 'release') {
              '${{ github.event.release.tag_name }}' -replace '^v', ''
          } else {
              '${{ github.event.inputs.version }}'
          }
          Write-Host "Publishing version: $version"
          $manifest = Get-Content ./src/PsBash.Module/PsBash.psd1 -Raw
          $manifest = $manifest -replace "ModuleVersion = '.*'", "ModuleVersion = '$version'"
          Set-Content ./src/PsBash.Module/PsBash.psd1 -Value $manifest
          # Verify
          $data = Import-PowerShellDataFile ./src/PsBash.Module/PsBash.psd1
          Write-Host "Manifest version: $($data.ModuleVersion)"

          # Sync version to PsBash.Cmdlets.psd1 and update RequiredModules dependency
          $cmdletsManifest = Get-Content ./src/PsBash.Cmdlets/PsBash.Cmdlets.psd1 -Raw
          $cmdletsManifest = $cmdletsManifest -replace "ModuleVersion = '[^']*'", "ModuleVersion = '$version'"
          $cmdletsManifest = $cmdletsManifest -replace "ModuleName = 'PsBash'; ModuleVersion = '[^']*'", "ModuleName = 'PsBash'; ModuleVersion = '$version'"
          Set-Content ./src/PsBash.Cmdlets/PsBash.Cmdlets.psd1 -Value $cmdletsManifest
          $cmdletsData = Import-PowerShellDataFile ./src/PsBash.Cmdlets/PsBash.Cmdlets.psd1
          Write-Host "Cmdlets manifest version: $($cmdletsData.ModuleVersion)"

      - name: Prepare module directories
        shell: pwsh
        run: |
          Copy-Item -Path ./src/PsBash.Module -Destination ./PsBash -Recurse
          Test-ModuleManifest -Path ./PsBash/PsBash.psd1
          Copy-Item -Path ./src/PsBash.Cmdlets -Destination ./PsBash.Cmdlets -Recurse
          Test-ModuleManifest -Path ./PsBash.Cmdlets/PsBash.Cmdlets.psd1

      - name: Publish PsBash to PSGallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          Publish-Module -Path ./PsBash -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery -Verbose

      - name: Publish PsBash.Cmdlets to PSGallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          Publish-Module -Path ./PsBash.Cmdlets -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery -Verbose

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack and publish to NuGet
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          $version = if ('${{ github.event_name }}' -eq 'release') {
              '${{ github.event.release.tag_name }}' -replace '^v', ''
          } else {
              '${{ github.event.inputs.version }}'
          }
          # Update csproj version to match release
          $csproj = Get-Content ./src/PsBash.Core/PsBash.Core.csproj -Raw
          $csproj = $csproj -replace '<Version>.*</Version>', "<Version>$version</Version>"
          Set-Content ./src/PsBash.Core/PsBash.Core.csproj -Value $csproj
          Write-Host "PsBash.Core version set to: $version"

          dotnet pack ./src/PsBash.Core/PsBash.Core.csproj -c Release -o ./nuget-out
          dotnet nuget push ./nuget-out/*.nupkg --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
